name: sdk-benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/golden_tasks.json"
      - "scripts/benchmark_runner.py"
      - "scripts/benchmark_report.py"
      - ".github/workflows/benchmark.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernell-os-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run benchmark
        run: |
          python scripts/benchmark_runner.py --build "${{ github.sha }}"

      - name: Build benchmark report
        run: |
          RUN_FILE=$(ls -t benchmarks/runs/*.jsonl | head -n 1)
          python scripts/benchmark_report.py --run-file "$RUN_FILE" | tee benchmark_report.json

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-benchmark-${{ github.run_id }}
          path: |
            kernell-os-sdk/benchmarks/runs/*.jsonl
            kernell-os-sdk/benchmark_report.json
          if-no-files-found: error

      - name: Print report summary
        run: |
          cat benchmark_report.json
