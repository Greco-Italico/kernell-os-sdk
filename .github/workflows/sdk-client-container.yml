name: sdk-client-container

on:
  workflow_dispatch:
    inputs:
      run_chaos:
        description: "Run optional chaos profile job"
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - "deploy/Dockerfile.sdk-client"
      - "deploy/docker-compose.sdk-client.yml"
      - "deploy/client_smoke.py"
      - "pyproject.toml"
      - "README.md"

jobs:
  client-install-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernell-os-sdk
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Build and run client install stack
        run: |
          set -euo pipefail
          docker compose -f deploy/docker-compose.sdk-client.yml up --build --abort-on-container-exit | tee /tmp/sdk-client-smoke.log

      - name: Validate smoke JSON gate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          log_path = Path("/tmp/sdk-client-smoke.log")
          lines = [line.strip() for line in log_path.read_text().splitlines() if line.strip()]
          candidates = [line for line in lines if line.startswith("{") and line.endswith("}")]
          if not candidates:
              raise SystemExit("No JSON smoke report found in compose logs")

          report = json.loads(candidates[-1])
          required = ["install", "import", "cli", "router", "telemetry", "policy", "failure_mode"]
          failed = [key for key in required if report.get(key) != "ok"]
          if failed:
              raise SystemExit(f"Smoke gate failed for keys: {failed}; report={report}")
          print(f"Smoke gate passed: {report}")
          PY

      - name: Tear down
        if: always()
        run: |
          docker compose -f deploy/docker-compose.sdk-client.yml down -v

  client-install-chaos:
    if: github.event_name == 'workflow_dispatch' && inputs.run_chaos == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernell-os-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run chaos profile
        run: |
          set -euo pipefail
          docker compose -f deploy/docker-compose.sdk-client.yml --profile chaos up --build --abort-on-container-exit sdk-client-chaos | tee /tmp/sdk-client-chaos.log

      - name: Validate chaos JSON gate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          log_path = Path("/tmp/sdk-client-chaos.log")
          lines = [line.strip() for line in log_path.read_text().splitlines() if line.strip()]
          candidates = [line for line in lines if line.startswith("{") and line.endswith("}")]
          if not candidates:
              raise SystemExit("No JSON chaos report found in compose logs")

          report = json.loads(candidates[-1])
          required_strict = ["install", "import", "cli", "telemetry", "policy", "failure_mode"]
          failed = [key for key in required_strict if report.get(key) != "ok"]
          if failed:
              raise SystemExit(f"Chaos gate failed for keys: {failed}; report={report}")
          if report.get("degraded") is not True:
              raise SystemExit(f"Chaos gate expected degraded=true; report={report}")
          print(f"Chaos gate passed: {report}")
          PY

      - name: Tear down chaos
        if: always()
        run: |
          docker compose -f deploy/docker-compose.sdk-client.yml --profile chaos down -v
