name: Kernell OS Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * 0' # Weekly scan

jobs:
  secret-scanning:
    name: 🕵️ Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  dependency-scanning:
    name: 📦 Supply Chain & Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scanners
        run: pip install safety pip-audit
      - name: Run pip-audit
        run: pip-audit
      - name: Run Safety
        run: safety check

  sast:
    name: 🔬 Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/python"
      - name: Set up Python
        uses: actions/setup-python@v5
      - name: Install Bandit & Ruff
        run: pip install bandit ruff mypy
      - name: Run Bandit
        run: bandit -r kernell_os_sdk/ -c pyproject.toml || true
      - name: Run Ruff Linter
        run: ruff check kernell_os_sdk/ || true

  security-fast:
    name: 🛡️ Security Fast Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[test]"
      
      - name: 🔒 1. Architecture Linter (SSRF Block)
        run: python test_ssrf_imports.py
        
      - name: 🔒 2. Multi-Layer Rate Limiter & Circuit Breakers
        run: python test_rate_limiting.py
        
      - name: 🔒 3. Verify Docker Hardening Options
        run: |
          grep -q "cap-drop=ALL" kernell_os_sdk/runtime/docker_runtime.py
          grep -q "network=none" kernell_os_sdk/runtime/docker_runtime.py
          grep -q "security-opt=no-new-privileges" kernell_os_sdk/runtime/docker_runtime.py
      - name: 🔒 4. Security tests (fast)
        run: pytest -q tests/security -m "not slow" --maxfail=1

  security-coverage:
    name: 📊 Security Coverage Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[test]"
      - name: Generate coverage JSON
        run: pytest -q tests/security --cov=kernell_os_sdk --cov-branch --cov-report=json:coverage.json
      - name: Enforce invariant coverage gates
        run: python scripts/check_security_gates.py

  security-nightly:
    name: 🌙 Security Slow/Fuzz Suite
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[test]"
      - name: Run slow security suite
        run: pytest -q tests/security -m "slow"

  build-and-sign:
    name: 🖋️ Build, SBOM & Artifact Signing
    needs: [secret-scanning, dependency-scanning, sast, security-fast, security-coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # For OIDC / Sigstore
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Wheel & Tarball
        run: |
          pip install build
          python -m build
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: kernell-os-sdk-sbom.spdx.json
      - name: Sign Artifacts (Sigstore/Cosign)
        uses: sigstore/gh-action-sigstore-python@v2.1.1
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            kernell-os-sdk-sbom.spdx.json
