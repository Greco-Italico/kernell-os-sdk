# Kernell OS — Production Redis Configuration (Hardened & AOF enabled)
# ════════════════════════════════════════════════════════════════════
# This file is strictly designed to support the Value Flow Engine Ledger
# and idempotency constraints of Kernell OS.

# ── 1. Network & Security ───────────────────────────────────────────
bind 0.0.0.0
protected-mode yes
port 6379

# Disable dangerous commands (Rename to empty string)
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command KEYS ""

# Require strong password (to be overridden by env variable in compose/k8s)
# requirepass "SET_YOUR_STRONG_PASSWORD_IN_ENV"

# ── 2. Persistence (AOF + RDB) ──────────────────────────────────────
# AOF is mandatory for Ledger consistency. RDB snapshots as backup.
appendonly yes
appendfsync everysec

# Prevent AOF fsync blocking during heavy rewrites
no-appendfsync-on-rewrite yes

# Use RDB preamble for faster AOF rewrites
aof-use-rdb-preamble yes

# RDB Snapshots (Fallback/Backup)
save 3600 1      # Save every hour if at least 1 key changed
save 300 100     # Save every 5 mins if 100 keys changed
save 60 10000    # Save every 1 min if 10000 keys changed

# ── 3. Memory Management ────────────────────────────────────────────
# Stop writes if memory is exhausted (No eviction for ledger keys!)
maxmemory-policy noeviction
# maxmemory 2gb (Uncomment and tune based on hardware)

# ── 4. High Availability / Replication Safety ───────────────────────
# Prevent silent split-brain writes if replicas are disconnected
min-replicas-to-write 1
min-replicas-max-lag 5
