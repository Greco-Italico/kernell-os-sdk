name: "kernell_sandbox"

mode: ONCE
time_limit: 5

disable_proc: true

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true

mount {
  src: "/usr"
  dst: "/usr"
  is_bind: true
  ro: true
}

mount {
  src: "/bin"
  dst: "/bin"
  is_bind: true
  ro: true
}

mount {
  dst: "/tmp"
  fstype: "tmpfs"
  rw: true
}

cwd: "/tmp"

rlimit_as: 256
rlimit_cpu: 2
rlimit_nofile: 32
